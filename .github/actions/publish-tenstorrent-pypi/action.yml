name: "Publish Tenstorrent PyPI"
description: "Publish Tenstorrent PyPI"

inputs:
  release-artifacts-id:
    description: "Release artifacts id"
    required: true
  release-artifacts-name:
    description: "Release artifacts name"
    required: true
  release-artifacts-wheel-path:
    description: "Release artifacts wheel path"
    required: true
  role-to-assume:
    description: "Role to assume"
    required: true
  region:
    description: "AWS region"
    required: true
  bucket:
    description: "S3 bucket"
    required: true

runs:
  using: "composite"
  steps:
    - uses: actions/download-artifact@v4
      with:
        artifact-ids: ${{ inputs.release-artifacts-id }}
        path: ${{ github.workspace }}/release
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ inputs.role-to-assume }} 
        aws-region: ${{ inputs.region }}
    
    - name: Install dependencies
      shell: bash
      run: |
        pip install build s3pypi
    
    - name: Publish package
      shell: bash
      run: |
        s3pypi upload ${{ github.workspace }}/release/${{ inputs.release-artifacts-name }}/${{ inputs.release-artifacts-wheel-path }} --bucket ${{ inputs.bucket }}
