name: AI Model Bringup
run-name: "AI Model Bringup ${{ inputs.model_url }}"

on:
  workflow_dispatch:
    inputs:
      model_url:
        description: "HuggingFace model URL (e.g. https://huggingface.co/meta-llama/Llama-3.2-1B)"
        required: true
        type: string
      device:
        description: "Tenstorrent device runner label (e.g. n150, n300)"
        required: false
        type: string
        default: "n150"

permissions:
  contents: read
  issues: read
  pull-requests: write
  actions: write
  id-token: write

jobs:

  # ── Job 1: extract model identifiers from the HuggingFace URL ──────────────
  parse-model:
    runs-on: ubuntu-latest
    outputs:
      model_id: ${{ steps.parse.outputs.model_id }}
      model_name: ${{ steps.parse.outputs.model_name }}
      branch_name: ${{ steps.parse.outputs.branch_name }}
    steps:
      - name: Parse model URL
        id: parse
        run: |
          URL="${{ inputs.model_url }}"
          # Strip protocol + host, keep last two path segments: org/model-name
          MODEL_ID=$(echo "$URL" | sed 's|https://huggingface.co/||' | sed 's|/$||')
          # Slugify: lowercase, replace slashes and non-alphanumeric with hyphens
          MODEL_NAME=$(echo "$MODEL_ID" | tr '[:upper:]' '[:lower:]' | sed 's|[^a-z0-9]|-|g' | sed 's|-\+|-|g' | sed 's|^-||;s|-$||')
          BRANCH="claude/bringup-${MODEL_NAME}"
          echo "model_id=${MODEL_ID}" >> "$GITHUB_OUTPUT"
          echo "model_name=${MODEL_NAME}" >> "$GITHUB_OUTPUT"
          echo "branch_name=${BRANCH}" >> "$GITHUB_OUTPUT"
          echo "Parsed: model_id=${MODEL_ID}, branch=${BRANCH}"

  # ── Job 2: write loader and validate on CPU ────────────────────────────────
  # Environment Claude runs in:
  #   Container : ghcr.io/tenstorrent/tt-xla/tt-xla-base-ubuntu-24-04:latest
  #               (Python, uv, git, gh CLI pre-installed; no TT hardware)
  #   tt-xla    : cloned to $TT_XLA_DIR; venv at $TT_XLA_DIR/venv/activate
  #               has torch, jax, and the latest tt-forge wheel
  #   tt-forge-models : tt-xla submodule at $FORGE_MODELS_DIR (no separate clone needed)
  #   gh CLI    : pre-authenticated via GH_TOKEN with write access to tt-forge-models
  #   Skill     : /model-bringup-cpu — reads $TT_XLA_DIR and $FORGE_MODELS_DIR from env,
  #               writes loader files, CPU-tests them, then writes bringup-cpu-status.txt
  #               (SUCCESS/FAILED) which the next step reads to gate the git push
  bringup-cpu:
    needs: parse-model
    runs-on: tt-ubuntu-2204-xlarge-stable

    container:
      image: ghcr.io/tenstorrent/tt-xla/tt-xla-base-ubuntu-24-04:latest

    defaults:
      run:
        working-directory: ${{ github.workspace }}

    env:
      REPORT_FILE: tt-forge-ai-report-cpu.md
      TT_XLA_DIR: ${{ github.workspace }}/tt-xla
      FORGE_MODELS_DIR: ${{ github.workspace }}/tt-xla/third_party/tt_forge_models

    steps:
      - name: Checkout tt-forge (for .claude/skills)
        uses: actions/checkout@v6

      - name: Clone tt-xla with all submodules
        shell: bash
        run: |
          git clone --recurse-submodules https://github.com/tenstorrent/tt-xla.git "$TT_XLA_DIR"
          cd "$FORGE_MODELS_DIR"
          BRANCH="${{ needs.parse-model.outputs.branch_name }}"
          # If the bringup branch already exists on the remote (re-run for this
          # model), check it out now so the agent's writes layer on top and we
          # push a new commit instead of starting over.
          if git rev-parse --verify "origin/$BRANCH" >/dev/null 2>&1; then
            echo "Existing bringup branch $BRANCH found — checking it out"
            git checkout "$BRANCH"
          fi

      - name: Set up tt-xla environment and install latest wheel
        shell: bash
        run: |
          cd "$TT_XLA_DIR"
          source venv/activate
          pip install tt-forge --extra-index-url https://pypi.eng.aws.tenstorrent.com/

      - name: Run Claude Code agent (CPU bringup)
        id: claude
        timeout-minutes: 60
        uses: anthropics/claude-code-action@v1
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          TT_XLA_DIR: ${{ env.TT_XLA_DIR }}
          FORGE_MODELS_DIR: ${{ env.FORGE_MODELS_DIR }}
          REPORT_FILE: ${{ env.REPORT_FILE }}
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          settings: |
            {
              "permissions": {
                "allow": ["Bash(*)", "Read(*)", "Write(*)", "Edit(*)", "Glob(*)", "Grep(*)"],
                "deny": []
              }
            }
          prompt: /model-bringup-cpu ${{ needs.parse-model.outputs.model_id }} ${{ needs.parse-model.outputs.branch_name }}

      - name: Commit and push loader to tt-forge-models
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        shell: bash
        run: |
          STATUS=$(cat "$GITHUB_WORKSPACE/bringup-cpu-status.txt" 2>/dev/null || echo "FAILED")
          if [ "$STATUS" != "SUCCESS" ]; then
            echo "CPU bringup did not succeed — skipping push."
            exit 1
          fi
          cd "$FORGE_MODELS_DIR"
          gh auth setup-git
          git config user.name "AI Model Bringup"
          git config user.email "ai-bringup@tenstorrent.com"
          BRANCH="${{ needs.parse-model.outputs.branch_name }}"
          MODEL_NAME="${{ needs.parse-model.outputs.model_name }}"
          BRANCH_URL="https://github.com/tenstorrent/tt-forge-models/tree/$BRANCH"
          # The clone step already checked out $BRANCH if it existed remotely;
          # otherwise we're on the cloned default branch and need to create it.
          if [ "$(git rev-parse --abbrev-ref HEAD)" != "$BRANCH" ]; then
            git checkout -b "$BRANCH"
          fi
          git add -A
          STAGED=$(git diff --cached --name-status)
          if [ -z "$STAGED" ]; then
            echo "No staged changes — agent's output matches current branch. Nothing to push."
            if git rev-parse --verify "origin/$BRANCH" >/dev/null 2>&1; then
              echo "**Branch:** [\`$BRANCH\`]($BRANCH_URL)" >> "$GITHUB_STEP_SUMMARY"
            fi
            exit 0
          fi
          echo "Staged files:"
          echo "$STAGED"
          git commit -m "$MODEL_NAME loader (AI-generated)"
          git push -u origin "$BRANCH"
          echo "Pushed branch: $BRANCH"
          echo "**Branch:** [\`$BRANCH\`]($BRANCH_URL)" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload CPU report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.REPORT_FILE }}
          path: ${{ github.workspace }}/${{ env.REPORT_FILE }}
          if-no-files-found: warn

      - name: Attach CPU report to job summary
        if: always()
        shell: bash
        run: |
          echo "## CPU Bringup: ${{ needs.parse-model.outputs.model_id }}" >> "$GITHUB_STEP_SUMMARY"
          cat "$GITHUB_WORKSPACE/${{ env.REPORT_FILE }}" >> "$GITHUB_STEP_SUMMARY" \
            || echo 'Agent did not produce a report.' >> "$GITHUB_STEP_SUMMARY"

      - name: Cleanup after Claude action
        if: always()
        shell: bash
        run: chmod -R 777 /__w/_actions/anthropics

  # ── Job 3: validate on Tenstorrent hardware and open PR ─────────────────────
  # Environment Claude runs in:
  #   Container : ubuntu:24.04 + /dev/tenstorrent device + hugepages
  #               base deps (git, python3, pip, gh CLI) installed in pre-steps
  #   tt-forge  : installed via pip from pypi.eng.aws.tenstorrent.com; tt-forge-install
  #               initialises the TT hardware driver
  #   tt-forge-models : tt-xla submodule at $FORGE_MODELS_DIR, switched to the CPU bringup branch
  #   Skill     : /model-bringup-tt-hardware — reads $FORGE_MODELS_DIR from env,
  #               runs the loader on TT hardware (up to 4 fix attempts), then writes
  #               bringup-hw-status.txt (SUCCESS/FAILED); all GitHub interactions
  #               (force-push of fixes, PR creation) are handled by workflow steps
  bringup-hardware:
    needs: [parse-model, bringup-cpu]
    # Run even if the CPU bringup job failed — some models OOM on the host runner
    # but can still be brought up directly on the TT card. parse-model is the only
    # hard prerequisite (we need the parsed model_id / branch_name).
    if: always() && needs.parse-model.result == 'success'
    runs-on:
      - ${{ inputs.device }}
      - in-service
      - claude

    container:
      image: ghcr.io/tenstorrent/tt-xla/tt-xla-base-ubuntu-24-04:latest
      options: --device /dev/tenstorrent
      volumes:
        - /dev/hugepages:/dev/hugepages
        - /dev/hugepages-1G:/dev/hugepages-1G

    defaults:
      run:
        working-directory: ${{ github.workspace }}

    env:
      REPORT_FILE: tt-forge-ai-report-tt-hardware.md
      TT_XLA_DIR: ${{ github.workspace }}/tt-xla
      FORGE_MODELS_DIR: ${{ github.workspace }}/tt-xla/third_party/tt_forge_models

    steps:
      - name: Checkout tt-forge (for .claude/skills)
        uses: actions/checkout@v6

      - name: Clone tt-xla with all submodules
        shell: bash
        run: |
          git clone --recurse-submodules https://github.com/tenstorrent/tt-xla.git "$TT_XLA_DIR"
          cd "$FORGE_MODELS_DIR"
          BRANCH="${{ needs.parse-model.outputs.branch_name }}"
          # If the CPU job produced a bringup branch, check it out so the agent
          # picks up the CPU-validated loader. Otherwise stay on the default
          # branch — the agent will write the loader from scratch and the push
          # step will create the branch.
          if git rev-parse --verify "origin/$BRANCH" >/dev/null 2>&1; then
            echo "Existing bringup branch $BRANCH found — checking it out"
            git checkout "$BRANCH"
          else
            echo "No existing bringup branch — agent will create the loader from scratch on hardware"
          fi

      - name: Set up tt-xla environment and install latest wheel
        shell: bash
        run: |
          cd "$TT_XLA_DIR"
          source venv/activate
          pip install tt-forge --extra-index-url https://pypi.eng.aws.tenstorrent.com/

      - name: Run Claude Code agent (TT hardware bringup)
        id: claude
        timeout-minutes: 90
        uses: anthropics/claude-code-action@v1
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          FORGE_MODELS_DIR: ${{ env.FORGE_MODELS_DIR }}
          REPORT_FILE: ${{ env.REPORT_FILE }}
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          settings: |
            {
              "permissions": {
                "allow": ["Bash(*)", "Read(*)", "Write(*)", "Edit(*)", "Glob(*)", "Grep(*)"],
                "deny": []
              }
            }
          prompt: /model-bringup-tt-hardware ${{ needs.parse-model.outputs.model_id }} ${{ needs.parse-model.outputs.branch_name }} ${{ inputs.device }}

      - name: Upload TT hardware report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.REPORT_FILE }}
          path: ${{ github.workspace }}/${{ env.REPORT_FILE }}
          if-no-files-found: warn

      - name: Push loader fixes and open PR to tt-forge-models
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        shell: bash
        run: |
          STATUS=$(cat "$GITHUB_WORKSPACE/bringup-hw-status.txt" 2>/dev/null || echo "FAILED")
          if [ "$STATUS" != "SUCCESS" ]; then
            echo "Hardware bringup did not succeed — skipping PR."
            exit 1
          fi
          cd "$FORGE_MODELS_DIR"
          gh auth setup-git
          git config user.name "AI Model Bringup"
          git config user.email "ai-bringup@tenstorrent.com"
          BRANCH="${{ needs.parse-model.outputs.branch_name }}"
          MODEL_NAME="${{ needs.parse-model.outputs.model_name }}"
          BRANCH_URL="https://github.com/tenstorrent/tt-forge-models/tree/$BRANCH"
          # If CPU bringup produced a branch the clone step already checked it out;
          # otherwise we're on the default branch and need to create it now so the
          # agent's hardware-only output gets pushed as a new branch.
          if [ "$(git rev-parse --abbrev-ref HEAD)" != "$BRANCH" ]; then
            git checkout -b "$BRANCH"
          fi
          if [ -n "$(git status --porcelain)" ]; then
            git add -A
            STAGED=$(git diff --cached --name-status)
            echo "Staged files:"
            echo "$STAGED"
            git commit -m "$MODEL_NAME loader hardware bringup (AI-generated)"
            git push -u origin "$BRANCH"
            echo "Pushed branch: $BRANCH"
          else
            echo "Agent produced no changes — branch already matches; nothing to push."
          fi
          # Skip PR if the branch never made it to the remote (e.g., HW-only run
          # with no agent changes and no CPU branch to start from).
          if ! git rev-parse --verify "origin/$BRANCH" >/dev/null 2>&1; then
            echo "No remote branch — skipping PR."
            exit 0
          fi
          echo "**Branch:** [\`$BRANCH\`]($BRANCH_URL)" >> "$GITHUB_STEP_SUMMARY"
          EXISTING_PR=$(gh pr list \
            --repo tenstorrent/tt-forge-models \
            --head "$BRANCH" \
            --json url --jq '.[0].url')
          if [ -n "$EXISTING_PR" ]; then
            echo "PR already exists: $EXISTING_PR"
            PR_URL="$EXISTING_PR"
          else
            PR_URL=$(gh pr create \
              --repo tenstorrent/tt-forge-models \
              --base main \
              --head "$BRANCH" \
              --title "feat: add $MODEL_NAME loader (${{ needs.parse-model.outputs.model_id }})" \
              --body "AI-generated loader for \`${{ needs.parse-model.outputs.model_id }}\`. Validated on CPU and ${{ inputs.device }}. Created by AI Model Bringup workflow.")
            echo "Created PR: $PR_URL"
          fi
          if [ -n "$PR_URL" ]; then
            echo "**Pull request:** $PR_URL" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Attach TT hardware report to job summary
        if: always()
        shell: bash
        run: |
          echo "## TT Hardware Bringup (${{ inputs.device }}): ${{ needs.parse-model.outputs.model_id }}" >> "$GITHUB_STEP_SUMMARY"
          cat "$GITHUB_WORKSPACE/${{ env.REPORT_FILE }}" >> "$GITHUB_STEP_SUMMARY" \
            || echo 'Agent did not produce a report.' >> "$GITHUB_STEP_SUMMARY"

      - name: Cleanup after Claude action
        if: always()
        shell: bash
        run: chmod -R 777 /__w/_actions/anthropics
