name: Release RC and Stable Branches

on:
  schedule:
  - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      draft:
        type: boolean
        default: true
        description: Put PR in draft mode for testing
  push:

jobs:
  get-release-branches:
    outputs:
      json_results: ${{ steps.branches.outputs.json_results }}
    runs-on: ubuntu-latest
    env:
        GH_TOKEN: ${{ github.token }}
    steps:
    - uses: actions/checkout@v4
    # TODO: skip on nightly
    - uses: ./.github/actions/get-release-branches
      id: branches
      with:
        repo: tenstorrent/tt-forge-fe
    - name: echo json
      run: echo ${{ steps.branches.outputs.json_results }}

  releaser:
    runs-on: ubuntu-latest
    needs: get-release-branches
    strategy:
      matrix:
        include: ${{fromJson(needs.get-release-branches.outputs.json_results)}}
    env:
        GH_TOKEN: ${{ github.token }}
    steps:
    - uses: actions/checkout@v4
    - name: Set Releaser Meta
      id: set-meta
      shell: bash
      run: |
        # Select nightly workflow to confirm test pass and for wheel pick up
        if [[ "${{ fromJson(matrix).repo }}" =~ "tt-forge-fe" ]]; then
            workflow="On nightly"
            workflow_result_in_job="fail-notify"
            artifact_download_glob='*{wheel,test-reports}*'
            artifact_cleanup_file_glob='*{.json,benchmark_}*'
        elif [[ "${{ fromJson(matrix).repo }}" =~ "tt-torch" ]]; then
            workflow="Nightly Tests"
            workflow_result_in_job="fail-notify"
            artifact_download_glob='*{install-artifacts,test-reports-models-}*'
            artifact_cleanup_file_glob='*torchvision*'
            artifact_cleanup_folder_glob='*install-artifacts-debug*'
        else
            echo "Unknown repo: ${{ fromJson(matrix).repo }}"
            exit 1
        fi
        echo "workflow=$workflow" >> $GITHUB_OUTPUT
      
    - name: Releaser ${{ fromJson(matrix).repo }} ${{ fromJson(matrix).new_version_tag }}
      uses: ./.github/actions/releaser
      with:
        repo: ${{ fromJson(matrix).repo }}
        branch: ${{ fromJson(matrix).branch }}
        release_type: ${{ fromJson(matrix).release_type }}
        workflow: ${{ steps.set-meta.outputs.workflow }}
        workflow_allow_failed: ${{ inputs.workflow_allow_failed || false }}
        workflow_result_in_job: ${{ steps.set-meta.outputs.workflow_result_in_job }}
      
