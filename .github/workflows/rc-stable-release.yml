name: Release RC and Stable Branches

on:
  schedule:
  - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      draft:
        type: boolean
        default: true
        description: Put PR in draft mode for testing
  push:

jobs:
  get-release-branches:
    outputs:
      json_results: ${{ steps.branches.outputs.json_results }}
    runs-on: ubuntu-latest
    env:
        GH_TOKEN: ${{ github.token }}
    steps:
    - uses: actions/checkout@v4
    # TODO: skip on nightly
    - uses: ./.github/actions/get-release-branches
      id: branches
      with:
        repo: tenstorrent/tt-forge-fe
    - name: echo json
      run: echo ${{ steps.branches.outputs.json_results }}

  releaser:
    runs-on: ubuntu-latest
    needs: get-release-branches
    strategy:
      matrix:
        include: ${{fromJson(needs.get-release-branches.outputs.json_results)}}
    env:
        GH_TOKEN: ${{ github.token }}
    steps:
    - uses: actions/checkout@v4
      
    - name: Releaser
      uses: ./.github/actions/releaser
      with:
        repo: ${{ matrix.repo }}
        branch: ${{ matrix.branch }}
        release_type: ${{ matrix.release_type }}
        # TODO: empty latest_branch_commit will be used for nightly releases
        latest_branch_commit: ${{ matrix.latest_branch_commit || '' }}
        new_version_tag: ${{ matrix.new_version_tag }}
      