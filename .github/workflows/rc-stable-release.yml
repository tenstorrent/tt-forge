name: Release RC and Stable Branches

on:
  schedule:
  - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      draft:
        type: boolean
        default: true
        description: Put PR in draft mode for testing
  push:

jobs:
  get-release-branches:
    outputs:
      json_results: ${{ steps.branches.outputs.json_results }}
    runs-on: ubuntu-latest
    env:
        GH_TOKEN: ${{ github.token }}
    steps:
    - uses: actions/checkout@v4
    # TODO: skip on nightly
    - uses: ./.github/actions/get-release-branches
      id: branches
      with:
        repo: tenstorrent/tt-forge-fe
    - name: echo json
      run: echo ${{ steps.branches.outputs.json_results }}

  releaser:
    runs-on: ubuntu-latest
    needs: get-release-branches
    strategy:
      matrix:
        include: ${{fromJson(needs.get-release-branches.outputs.json_results)}}
    env:
        GH_TOKEN: ${{ github.token }}
    steps:
    - name: Releaser
      uses: ./.github/actions/releaser
      with:
        repo: ${{ fromJson(matrix.include).repo }}
        branch: ${{ fromJson(matrix.include).branch }}
        workflow: ${{ fromJson(matrix.include).workflow }}
        workflow_allow_failed: ${{ fromJson(matrix.include).workflow_allow_failed }}
        workflow_result_in_job: ${{ fromJson(matrix.include).workflow_result_in_job }}
      
