name: Rc Release

on:
  schedule:
  - cron: '0 6 24 * *'
  workflow_dispatch:
    inputs:
      draft:
        type: boolean
        default: true
        description: Put PR in draft mode for testing
  push:


jobs:
  rc-release:
    runs-on: ubuntu-latest
    env:
        GH_TOKEN: ${{ github.token }}
    steps:
    - uses: actions/checkout@v4
    #- name: version tag
    #  id: version-tag
    #  run: |
    #    source .version
    #    tag="${VERSION}.dev$(date +"%Y%m%d%H%M%S")"
    #    echo "tag=$tag" >> $GITHUB_OUTPUT
    - name: Create RC branch - tenstorrent/tt-forge-fe
      uses: ./.github/actions/create-rc-branch
      id: Create-RC-branch
      with:
        repo: tenstorrent/tt-forge-fe
        workflow: On nightly 

