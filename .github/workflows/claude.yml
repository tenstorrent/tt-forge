name: Claude Code Generic Action

on:
  workflow_dispatch:
    inputs:
      prompt:
        description: 'Prompt for Claude'
        required: true
        type: string
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: write
    steps:
      - name: Check Authorization
        id: auth_check
        if: github.event_name != 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Determine the actor and event type
          ACTOR="${{ github.actor }}"
          EVENT_NAME="${{ github.event_name }}"
          
          # Get author association based on event type
          if [[ "$EVENT_NAME" == "issue_comment" ]]; then
            AUTHOR_ASSOC="${{ github.event.comment.author_association }}"
            COMMENT_ID="${{ github.event.comment.id }}"
          elif [[ "$EVENT_NAME" == "pull_request_review_comment" ]]; then
            AUTHOR_ASSOC="${{ github.event.comment.author_association }}"
            COMMENT_ID="${{ github.event.comment.id }}"
          elif [[ "$EVENT_NAME" == "pull_request_review" ]]; then
            AUTHOR_ASSOC="${{ github.event.review.author_association }}"
            COMMENT_ID="${{ github.event.review.id }}"
          elif [[ "$EVENT_NAME" == "issues" ]]; then
            AUTHOR_ASSOC="${{ github.event.issue.author_association }}"
            ISSUE_NUMBER="${{ github.event.issue.number }}"
          fi
          
          echo "Actor: $ACTOR"
          echo "Event: $EVENT_NAME"
          echo "Author Association: $AUTHOR_ASSOC"
          
          # Check if user is authorized (MEMBER, OWNER, or COLLABORATOR)
          if [[ "$AUTHOR_ASSOC" == "MEMBER" || "$AUTHOR_ASSOC" == "OWNER" || "$AUTHOR_ASSOC" == "COLLABORATOR" ]]; then
            echo "✅ Authorization successful: $ACTOR is a $AUTHOR_ASSOC"
            echo "authorized=true" >> $GITHUB_OUTPUT
          else
            echo "❌ Authorization failed: $ACTOR is a $AUTHOR_ASSOC (not MEMBER, OWNER, or COLLABORATOR)"
            echo "Only organization members and repository collaborators can trigger Claude workflows."
            echo "authorized=false" >> $GITHUB_OUTPUT
            
            # Add reaction to the comment/issue to indicate it didn't run
            if [[ -n "$COMMENT_ID" ]]; then
              gh api \
                --method POST \
                -H "Accept: application/vnd.github+json" \
                -H "X-GitHub-Api-Version: 2022-11-28" \
                "/repos/${{ github.repository }}/issues/comments/$COMMENT_ID/reactions" \
                -f content='-1' || true
            elif [[ -n "$ISSUE_NUMBER" ]]; then
              gh api \
                --method POST \
                -H "Accept: application/vnd.github+json" \
                -H "X-GitHub-Api-Version: 2022-11-28" \
                "/repos/${{ github.repository }}/issues/$ISSUE_NUMBER/reactions" \
                -f content='-1' || true
            fi
            
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}

          # This setting allows Claude to read CI results and trigger workflows
          additional_permissions: |
            actions: write

          # Allow Claude to use gh cli for issues, PRs, and CI
          allowed_tools: |
            Bash(gh issue create:*)
            Bash(gh issue view:*)
            Bash(gh issue list:*)
            Bash(gh search:*)
            Bash(gh pr create:*)
            Bash(gh pr comment:*)
            Bash(gh pr diff:*)
            Bash(gh pr view:*)
            Bash(gh pr list:*)
            Bash(gh run list:*)
            Bash(gh run view:*)
            Bash(gh workflow list:*)
            Bash(gh workflow view:*)

          # Use prompt from workflow_dispatch input when triggered manually
          prompt: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.prompt || '' }}
        env:
          USE_SIMPLE_PROMPT: "true"
