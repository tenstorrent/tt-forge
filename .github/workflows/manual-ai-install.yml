name: AI install test

on:
  workflow_dispatch: {}

permissions:
  contents: read
  issues: read
  pull-requests: read
  actions: write
  id-token: write

jobs:

  tt-forge-ai-agent:

    # Use claude labeled runners for Claude action
    runs-on:
      - n300
      - claude

    container:
      image: ubuntu:24.04
      options: --device /dev/tenstorrent
      volumes:
        - /dev/hugepages:/dev/hugepages
        - /dev/hugepages-1G:/dev/hugepages-1G

    steps:

      - name: Check /dev/tenstorrent is available
        run: |
          if [ -e /dev/tenstorrent ]; then
            echo "✓ /dev/tenstorrent is available in container"
            ls -l /dev/tenstorrent || true
          else
            echo "✗ /dev/tenstorrent is NOT available in container"
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install base dependencies for agent
        run: |
          export DEBIAN_FRONTEND=noninteractive
          apt-get update -qq > /dev/null 2>&1 || { echo "apt-get update failed"; exit 1; }
          apt-get install -y -qq \
            git curl ca-certificates unzip \
            python3 python3-pip python3-venv \
            build-essential pkg-config cmake > /dev/null 2>&1 || { echo "apt-get install failed"; exit 1; }

      - name: Prepare agent prompt
        run: |
          cat <<'EOF' > /tmp/claude-prompt.txt
          You are an autonomous assistant running inside a GitHub Actions job
          on a Tenstorrent machine. /dev/tenstorrent is available inside this
          Ubuntu 24.04 container.

          Your goal is to evaluate how good our installation and demo
          instructions are for tt-forge.

          The tt-forge repository is already checked out in the current working
          directory. Start by reading README.md and any linked docs to understand
          how to install tt-forge and run demos. The demo scripts are also located
          in this repository.

          High-level instructions (from the maintainer):
          - You should try installing and testing tt-forge.
          - Read the README.md and docs in the current directory for install
            and demo instructions.
          - You are allowed to make some common-sense attempts to fix problems,
            but not indefinitely. This is an experiment to evaluate how good
            our instructions are, not to brute-force every issue.
          - You should report whether you managed to follow the instructions,
            whether you succeeded, what errors you encountered, which fixes
            you tried, and end with a brief feedback summary.

          Concrete tasks for this run:
          1. Read README.md and linked docs in the repo to understand how to
             install tt-forge and run demos.
          2. Follow the instructions to install tt-forge.
          3. Run the demo/test scripts found in the repo.
          4. For each failure:
             - Capture the exact command and the full error message.
             - Make at most 2-3 reasonable, safe attempts to fix it
               (e.g., missing packages, small environment issues).
             - If it still fails, stop and treat it as a documented failure,
               not something to keep retrying indefinitely.
          5. Do NOT modify repository code, open PRs, or push anywhere.
          6. At the end of your work, produce a report at /github/workspace/tt-forge-ai-report.md with:
                - Summary (success/fail, and whether demos ran on hardware)
                - Steps you followed (high-level, not every tiny shell command)
                - Which versions of tt-forge and other tenstorrent packages have been installed
                - Failures and attempted fixes (bulleted list)
                - Final status (what works, what is still broken)
                - Brief feedback on clarity/completeness of the tt-forge
                  install and demo instructions (what was easy, what was confusing,
                  where you needed to guess).

          7. Keep your shell output readable. Prefer commands that exit on
             error and avoid interactive prompts.

          Stop once you have either:
          - Successfully installed tt-forge and run at least one demo/test, or
          - Hit blocking issues you cannot reasonably fix with a few attempts.
          EOF

          echo "=== Agent prompt ==="
          cat /tmp/claude-prompt.txt
          echo "===================="

          # Export for next step
          {
            echo "CLAUDE_PROMPT<<EOF"
            cat /tmp/claude-prompt.txt
            echo "EOF"
          } >> "$GITHUB_ENV"

      - name: Run Claude Code agent to install and test tt-forge
        id: claude
        timeout-minutes: 30
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          settings: |
            {
              "permissions": {
                "allow": ["Bash(*)", "Read(*)", "Write(*)", "Edit(*)", "Glob(*)", "Grep(*)"],
                "deny": []
              }
            }
          prompt: ${{ env.CLAUDE_PROMPT }}

      - name: Attach summary to job summary
        if: always()
        run: |
          echo '## TT-Forge AI install/test report' >> "$GITHUB_STEP_SUMMARY"
          if [ -f /github/workspace/tt-forge-ai-report.md ]; then
            cat /github/workspace/tt-forge-ai-report.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo 'Agent did not produce a summary.' >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Cleanup after claude action
        if: always()
        shell: bash
        run: |
          # The claude-code-action may leave behind files owned by root or with restrictive permissions,
          # which can cause issues for subsequent runs. We need to ensure everything is cleaned up properly.
          # Set premissions to all files under /home/ubuntu/actions-runner/_work/_actions/anthropics
          # to ensure runner we can delete them (ubuntu user)
          echo "Cleaning up after Claude agent..."
          chmod -R 777 /__w/_actions/anthropics
