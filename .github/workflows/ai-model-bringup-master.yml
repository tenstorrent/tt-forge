name: AI Model Bringup (Master)
run-name: "AI Model Bringup Master — run #${{ github.run_number }} by ${{ github.actor }}"

on:
  workflow_dispatch:
    inputs:
      bringup_spec:
        description: |
          JSON array of bringup specs. Example:
          [{"model_url":"https://huggingface.co/meta-llama/Llama-3.2-1B","device":"n150","additional_prompt":""},
           {"model_url":"https://huggingface.co/Qwen/Qwen2.5-0.5B","device":"n300","additional_prompt":""}]
        required: true
        type: string

permissions:
  contents: read
  issues: read
  pull-requests: write
  actions: write
  id-token: write

jobs:

  # ── Job 1: fan-out — one child workflow per spec entry ──────────────────────
  bringup:
    strategy:
      fail-fast: false
      matrix:
        spec: ${{ fromJson(inputs.bringup_spec) }}
    uses: ./.github/workflows/ai-model-bringup.yml
    with:
      model_url: ${{ matrix.spec.model_url }}
      device: ${{ matrix.spec.device || 'n150' }}
      additional_prompt: ${{ matrix.spec.additional_prompt || '' }}
    secrets: inherit

  # ── Job 2: aggregate results into a combined summary ────────────────────────
  summary:
    needs: bringup
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Download all bringup artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: false

      - name: Aggregate reports with Claude
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          settings: |
            {
              "permissions": {
                "allow": ["Bash(*)", "Read(*)", "Glob(*)"],
                "deny": []
              }
            }
          prompt: |
            Aggregate bringup results from a batch run into a combined GitHub Actions job summary.

            All per-model artifacts are in ./artifacts/. Each model has two artifact directories:
              artifacts/<model-name>-cpu/  — contents of the report-ai-bringup/ folder from the CPU job
              artifacts/<model-name>-hw/   — contents of the report-ai-bringup/ folder from the hardware job
            Files you will typically find there: tt-forge-ai-report-cpu.md, bringup-cpu-status.txt,
            tt-forge-ai-report-tt-hardware.md, bringup-hw-status.txt, bringup-hw-pr-url.txt.
            The exact filenames and content may vary as the bringup skills evolve — discover them at runtime.

            Steps:
            1. Discover all models by listing ./artifacts/ subdirectories.
            2. Read every available report and status file.
            3. Write the combined summary to $GITHUB_STEP_SUMMARY using Bash (append with >>).

            The summary must contain:
            - Header: "# AI Model Bringup — Master Summary"
            - "Run `#${{ github.run_number }}` · triggered by `${{ github.actor }}`"
            - A markdown table: | Model | Device | CPU | Hardware | PR |
              Use ✅ for SUCCESS and ❌ for FAILED or missing. Link the PR column when a URL is available.
            - "## Individual Reports": for each model, a <details><summary><b>model-name</b></summary>…</details>
              block with the full CPU and hardware report content (note if absent).

            Be resilient to partial results (cancelled or skipped jobs).
            Synthesise key outcomes rather than mechanically concatenating files.
